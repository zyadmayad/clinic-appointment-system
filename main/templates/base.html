<!DOCTYPE html>
<html class="light" lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>{% block title %}Sanctuary Health{% endblock %}</title>
	<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
	<script id="tailwind-config">
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					"colors": {
						"surface-container": "#e5eeff",
						"tertiary-fixed": "#ffdbcd",
						"on-tertiary": "#ffffff",
						"inverse-on-surface": "#eaf1ff",
						"on-primary-fixed": "#00174b",
						"surface-container-highest": "#d3e4fe",
						"on-secondary": "#ffffff",
						"inverse-surface": "#213145",
						"surface-container-lowest": "#ffffff",
						"on-secondary-fixed-variant": "#31447b",
						"outline-variant": "#c3c6d7",
						"on-tertiary-fixed-variant": "#7d2d00",
						"surface-container-high": "#dce9ff",
						"tertiary-fixed-dim": "#ffb596",
						"primary": "#004ac6",
						"tertiary": "#943700",
						"primary-fixed": "#dbe1ff",
						"on-tertiary-fixed": "#360f00",
						"secondary-fixed": "#dbe1ff",
						"primary-fixed-dim": "#b4c5ff",
						"error-container": "#ffdad6",
						"surface-tint": "#0053db",
						"on-primary": "#ffffff",
						"on-error": "#ffffff",
						"on-surface": "#0b1c30",
						"on-primary-container": "#eeefff",
						"secondary-fixed-dim": "#b4c5ff",
						"surface-bright": "#f8f9ff",
						"primary-container": "#2563eb",
						"error": "#ba1a1a",
						"surface-dim": "#cbdbf5",
						"inverse-primary": "#b4c5ff",
						"on-background": "#0b1c30",
						"background": "#f8f9ff",
						"secondary": "#495c95",
						"on-secondary-container": "#394c84",
						"on-primary-fixed-variant": "#003ea8",
						"on-error-container": "#93000a",
						"surface-container-low": "#eff4ff",
						"outline": "#737686",
						"on-surface-variant": "#434655",
						"tertiary-container": "#bc4800",
						"surface-variant": "#d3e4fe",
						"on-secondary-fixed": "#00174b",
						"surface": "#f8f9ff",
						"secondary-container": "#acbfff",
						"on-tertiary-container": "#ffede6"
					},
					"borderRadius": {
						"DEFAULT": "0.25rem",
						"lg": "0.5rem",
						"xl": "0.75rem",
						"full": "9999px"
					},
					"fontFamily": {
						"headline": ["Inter"],
						"body": ["Inter"],
						"label": ["Inter"]
					}
				}
			}
		}
	</script>
	<style>
		body { font-family: 'Inter', sans-serif; }
		.glass-effect {
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
		}
		.material-symbols-outlined {
			font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
		}
	</style>
	{% block extra_head %}{% endblock %}
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
	{% block show_header %}{% include "header.html" %}{% endblock %}

	<main class="{% block main_classes %}flex-grow pt-32 pb-20 px-8 max-w-7xl mx-auto w-full{% endblock %}">
		{% block content %}{% endblock %}
	</main>

	{% block show_footer %}{% include "footer.html" %}{% endblock %}
</body>
</html>
