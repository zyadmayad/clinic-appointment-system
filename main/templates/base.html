<!DOCTYPE html>
<html class="dark" lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>{% block title %}ClinixCare{% endblock %}</title>
	<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet" />
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
	<script id="tailwind-config">
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					colors: {
						"inverse-on-surface": "#283044",
						"surface-container-low": "#131b2e",
						"surface-container-lowest": "#060e20",
						"secondary-container": "#3131c0",
						"outline-variant": "#3c4a42",
						"on-error": "#690005",
						"surface-tint": "#4edea3",
						"on-primary-container": "#00422b",
						"secondary-fixed": "#e1e0ff",
						"surface-container-highest": "#2d3449",
						"primary-fixed-dim": "#4edea3",
						"surface-dim": "#0b1326",
						"on-tertiary-fixed-variant": "#653e00",
						"tertiary-fixed": "#ffddb8",
						"on-tertiary-container": "#523200",
						"on-error-container": "#ffdad6",
						"on-primary": "#003824",
						"on-primary-fixed": "#002113",
						"on-surface-variant": "#bbcabf",
						"inverse-surface": "#dae2fd",
						"surface-container-high": "#222a3d",
						"inverse-primary": "#006c49",
						"tertiary": "#ffb95f",
						"secondary": "#c0c1ff",
						"surface-variant": "#2d3449",
						"on-secondary": "#1000a9",
						"surface": "#0b1326",
						"on-tertiary": "#472a00",
						"on-secondary-container": "#b0b2ff",
						"error": "#ffb4ab",
						"primary-fixed": "#6ffbbe",
						"tertiary-container": "#e29100",
						"on-tertiary-fixed": "#2a1700",
						"on-secondary-fixed-variant": "#2f2ebe",
						"tertiary-fixed-dim": "#ffb95f",
						"on-background": "#dae2fd",
						"primary-container": "#10b981",
						"surface-container": "#171f33",
						"primary": "#4edea3",
						"secondary-fixed-dim": "#c0c1ff",
						"background": "#0b1326",
						"on-surface": "#dae2fd",
						"on-secondary-fixed": "#07006c",
						"outline": "#86948a",
						"error-container": "#93000a",
						"surface-bright": "#31394d",
						"on-primary-fixed-variant": "#005236"
					},
					borderRadius: {
						DEFAULT: "0.125rem",
						lg: "0.25rem",
						xl: "0.5rem",
						full: "0.75rem"
					},
					spacing: {
						"margin-mobile": "1rem",
						xl: "2.5rem",
						gutter: "1.5rem",
						md: "1rem",
						sm: "0.5rem",
						"margin-desktop": "2rem",
						base: "4px",
						xs: "0.25rem",
						lg: "1.5rem"
					},
					fontFamily: {
						"display-lg": ["Manrope"],
						"headline-lg-mobile": ["Manrope"],
						"body-sm": ["Manrope"],
						"label-sm": ["JetBrains Mono"],
						"body-md": ["Manrope"],
						"headline-md": ["Manrope"],
						"headline-lg": ["Manrope"],
						"label-md": ["JetBrains Mono"],
						"body-lg": ["Manrope"]
					},
					fontSize: {
						"display-lg": ["48px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "800" }],
						"headline-lg-mobile": ["24px", { lineHeight: "1.3", fontWeight: "700" }],
						"body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
						"label-sm": ["10px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "500" }],
						"body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
						"headline-md": ["24px", { lineHeight: "1.4", fontWeight: "600" }],
						"headline-lg": ["32px", { lineHeight: "1.3", letterSpacing: "-0.01em", fontWeight: "700" }],
						"label-md": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "500" }],
						"body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }]
					}
				}
			}
		}
	</script>
	<style>
		body { font-family: 'Manrope', sans-serif; background-color: #0b1326; }
		.material-symbols-outlined {
			font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
		}
		.glass-edge { border: 1px solid rgba(77, 222, 163, 0.1); }
		.rim-light { border-top: 1px solid #475569; }
		::-webkit-scrollbar { width: 8px; height: 8px; }
		::-webkit-scrollbar-track { background: #0b1326; }
		::-webkit-scrollbar-thumb { background: #2d3449; border-radius: 4px; }
		::-webkit-scrollbar-thumb:hover { background: #3c4a42; }
	</style>
	{% block extra_head %}{% endblock %}
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
	{% block show_header %}{% include "header.html" %}{% endblock %}

	<main class="{% block main_classes %}flex-grow pt-24 pb-16 px-margin-mobile lg:px-margin-desktop max-w-7xl mx-auto w-full{% endblock %}">
		{% block content %}{% endblock %}
	</main>

	{% block show_footer %}{% include "footer.html" %}{% endblock %}
</body>
</html>
