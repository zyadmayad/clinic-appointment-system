    <a href="{% url 'auth:home' %}" class="flex items-center gap-3 group">

        class="h-9 w-9 rounded-xl bg-[#22b7ab] flex items-center justify-center shadow-[0px_10px_20px_-8px_rgba(0,0,0,0.3)]"
